<!DOCTYPE html>
<html>
<head>
  <title>Extension Settings</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; }
    .rule-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
    input[type="text"] { flex-grow: 1; padding: 5px; }
    .controls { margin-top: 20px; }
    button { padding: 8px 15px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Rewrite Rules</h1>
  <div id="rules-container"></div>
  <div class="controls">
    <button id="add-rule">Add New Rule</button>
    <button id="save-rules" style="background: #4CAF50; color: white; border: none;">Save Changes</button>
  </div>
  <p><small>Modes: <b>Auto</b> (Redirect immediately) | <b>Manual</b> (Open new tab on icon click)</small></p>

  <template id="rule-template">
    <div class="rule-row">
      <input type="checkbox" class="rule-active" title="Enabled" checked>
      <input type="text" class="rule-match" placeholder="Match Regex (e.g. ^https://www.reddit.com(.*))">
      <input type="text" class="rule-replace" placeholder="Replace (e.g. https://old.reddit.com\1)">
      <select class="rule-mode">
        <option value="auto">Auto</option>
        <option value="manual">Manual</option>
      </select>
      <button class="remove-rule">×</button>
    </div>
  </template>

  <script src="options.js"></script>
</body>
</html>
